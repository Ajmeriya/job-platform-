spring.application.name=application-service
server.port=8082
jwt.secret=replace_with_a_secure_secret_key_minimum_32_characters_long
jwt.expiration-ms=86400000
services.job-service.base-url=http://localhost:8081
app.resume-upload-dir=uploads/resumes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=application-service-resume-analysis
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true
app.kafka.resume-analysis-request-topic=resume-analysis-requests
app.kafka.resume-analysis-result-topic=resume-analysis-results

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/application_service_db
spring.datasource.username=root
spring.datasource.password=Harsh@101845
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
